name: Build Turbopack CLI Release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  TURBOPACK_CLI_DIR: ${{ github.workspace }}/.release/turbopack-cli-linux-x64
  TURBOPACK_CLI_ARCHIVE: turbopack-cli-linux-x64.tar.gz
  TURBOPACK_CLI_RELEASE_TAG: turbopack-cli-main

jobs:
  build-release:
    name: Build release turbopack-cli
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Rust toolchain
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal

      - name: Cache Cargo build outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release turbopack-cli
        env:
          CI: "1"
        run: cargo build --locked --release --bin turbopack-cli

      - name: Package release artifact
        run: |
          set -euo pipefail
          mkdir -p "$TURBOPACK_CLI_DIR"
          cp target/release/turbopack-cli "$TURBOPACK_CLI_DIR/turbopack-cli"
          chmod +x "$TURBOPACK_CLI_DIR/turbopack-cli"
          git rev-parse HEAD > "$TURBOPACK_CLI_DIR/source-commit.txt"
          "$TURBOPACK_CLI_DIR/turbopack-cli" --help >/dev/null
          tar -czf ".release/$TURBOPACK_CLI_ARCHIVE" -C "$TURBOPACK_CLI_DIR" .

      - name: Publish main release asset
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file=".release/release-notes.md"
          {
            echo "Automated release build for main."
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Asset: $TURBOPACK_CLI_ARCHIVE"
          } > "$notes_file"

          git tag -f "$TURBOPACK_CLI_RELEASE_TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TURBOPACK_CLI_RELEASE_TAG"

          if gh release view "$TURBOPACK_CLI_RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$TURBOPACK_CLI_RELEASE_TAG" \
              --title "Main turbopack-cli" \
              --notes-file "$notes_file" \
              --latest=false
          else
            gh release create "$TURBOPACK_CLI_RELEASE_TAG" \
              --title "Main turbopack-cli" \
              --notes-file "$notes_file" \
              --latest=false
          fi

          gh release upload "$TURBOPACK_CLI_RELEASE_TAG" \
            ".release/$TURBOPACK_CLI_ARCHIVE" \
            --clobber
